<h1>《孟子》盡心章句上．第四十三章</h1>
<h1>公都子曰：</h1>
<h1>　「<ruby>滕<rt>ㄊㄥˊ</rt></ruby>更之在門也，若在所禮而不答，何也？」</h1>
<h1>孟子曰：</h1>
<h1>　「<ruby>挾<rt>ㄒㄧㄝˊ</rt></ruby>貴而問，<ruby>挾<rt>ㄒㄧㄝˊ</rt></ruby>賢而問，<ruby>挾<rt>ㄒㄧㄝˊ</rt></ruby>長而問，<ruby>挾<rt>ㄒㄧㄝˊ</rt></ruby>有勳勞而問，<ruby>挾<rt>ㄒㄧㄝˊ</rt></ruby>故而問，皆所不答也。</h1>
<h1>　　<ruby>滕<rt>ㄊㄥˊ</rt></ruby>更有二焉。」</h1>
<p>&nbsp;</p>
<h3>《AI生成的註釋》</h3>
<h3>公都子：孟子的弟子。</h3>
<h3>滕更：滕國國君的弟弟，在孟子門下求學。</h3>
<h3>在門：在門下，指求學。</h3>
<h3>若在所禮：似乎在應當禮遇的人之列。</h3>
<h3>挾：依仗、憑藉。</h3>
<h3>勳勞：功勳勞績。</h3>
<h3>故：舊交、老交情。</h3>
<h3>有二焉：佔了其中的兩條（通常指挾貴和挾賢）。</h3>

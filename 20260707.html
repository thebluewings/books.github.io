<h1>《孟子》盡心章句下．第七章</h1>
<h1>孟子曰：</h1>
<h1>　「吾今而後知殺人親之重也：</h1>
<h1>　　殺人之父，人亦殺其父；</h1>
<h1>　　殺人之兄，人亦殺其兄。</h1>
<h1>　　然則非自殺之也，一<ruby>間<rt>ㄐㄧㄢˋ</rt></ruby>耳。」</h1>
<p>&nbsp;</p>

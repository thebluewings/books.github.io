<h1>《孟子》盡心章句上．第四十章</h1>
<h1>孟子曰：</h1>
<h1>　「君子之所以教者五：</h1>
<h1>　　有如時雨化之者，有成德者，有達財者，有答問者，有私淑<ruby>艾<rt>ㄧˋ</rt></ruby>者。</h1>
<h1>　　此五者，君子之所以教也。」</h1>
<p>&nbsp;</p>
<h2>時雨：符合時節的雨，在洽到好處的時候降下的雨。在潛移默化中影響他人。</h2>
<h2>成德：幫助他人成就德行</h2>
<h2>達財：財，通「才」，幫助他人發現自己的長處，把能力發揮出來。但前提是他要先有德行。</h2>
<h2>私淑艾：雖然沒有受到本人當面教導，但因景仰其德行而自行學習效法。</h2>

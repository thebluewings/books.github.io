<h1>《孟子》盡心章句上．第四十章</h1>
<h1>孟子曰：</h1>
<h1>　「君子之所以教者五：</h1>
<h1>　　有如時雨化之者，有成德者，有達<ruby>財<rt>ㄘㄞˊ</rt></ruby>者，有答問者，有私淑<ruby>艾<rt>ㄧˋ</rt></ruby>者。</h1>
<h1>　　此五者，君子之所以教也。」</h1>

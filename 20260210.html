<h1>《孟子》盡心章句上．第二十八章</h1>
<h1>孟子曰：</h1>
<h1>　「柳下惠不以三公易其介。」</h1>
<p>&nbsp;</p>
<h2>柳下惠：春秋魯國賢人，以守節寬和聞名，姓展，名獲，字禽。</h2>
<h2>三公：古代最高等的官職，太師、太傅、太保</h2>
<h2>介：節操、操守、剛直不屈的品格</h2>
<h2>易：交換、改變</h2>

<h1>《孟子》盡心章句上．第四十五章</h1>
<h1>孟子曰：</h1>
<h1>　「君子之於物也，愛之而弗仁；</h1>
<h1>　　於民也，仁之而弗親。</h1>
<h1>　　親親而仁民，仁民而愛物。」</h1>

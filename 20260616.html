<h1>《孟子》盡心章句下．第二章</h1>
<h1>孟子曰：</h1>
<h1>　「春秋無義戰。</h1>
<h1>　　彼善於此，則有之矣。</h1>
<h1>　　<ruby>徵<rt>ㄓㄥ</rt></ruby>者上伐下也，敵國不相<ruby>徵<rt>ㄓㄥ</rt></ruby>也。」</h1>

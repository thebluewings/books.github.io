<h1>《孟子》盡心章句上．第三十四章</h1>
<h1>孟子曰：</h1>
<h1>　「仲子，不義與之齊國而弗受，人皆信之，是捨簞食豆羹之義也。</h1>
<h1>　　人莫大焉亡親戚、君臣、上下。</h1>
<h1>　　以其小者信其大者，奚可哉？」</h1>

<h1>《孟子》盡心章句下．第四章</h1>
<h1>孟子曰：</h1>
<h1>　「有人曰：『我善為陳，我善為戰。』大罪也。</h1>
<h1>　　國君好仁，天下無敵焉。</h1>
<h1>　　南面而徵北狄怨，東面而徵西夷怨。</h1>
<h1>　　曰：『奚為後我？』</h1>
<h1>　　武王之伐殷也，革車三百兩，虎<ruby>賁<rt>ㄅㄣ</rt></ruby>三千人。」</h1>
<h1>王曰：</h1>
<h1>　「無畏！寧爾也，非敵百姓也。</h1>
<h1>　　若崩<ruby>厥<rt>ㄐㄩㄝˊ</rt></ruby>角<ruby>稽<rt>ㄑㄧˇ</rt></ruby>首。</h1>
<h1>　　征之為言正也，各欲正己也，焉用戰！」</h1>

<h1>《孟子》盡心章句上．第四十一章</h1>
<h1>公孫丑曰：</h1>
<h1>　「道則高矣，美矣，宜若登天然，似不可及也。</h1>
<h1>　　何不使彼為可<ruby>幾<rt>ㄐㄧ</rt></ruby>及而日<ruby>孳<rt>ㄗ</rt></ruby><ruby>孳<rt>ㄗ</rt></ruby>也？」</h1>
<h1>孟子曰：</h1>
<h1>　「大匠不為拙工改廢繩墨，<ruby>羿<rt>ㄧˋ</rt></ruby>不為拙射變其<ruby>彀<rt>ㄍㄡˋ</rt></ruby><ruby>率<rt>ㄌㄩˋ</rt></ruby>。</h1>
<h1>　　君子引而不發，躍如也。中道而立，能者從之。」</h1>

<h1>《孟子》盡心章句下．第六章</h1>
<h1>孟子曰：</h1>
<h1>　「舜之<ruby>飯<rt>ㄈㄢˇ</rt></ruby><ruby>糗<rt>ㄑㄧㄡˇ</rt></ruby>茹草也，若將終身焉；</h1>
<h1>　　及其為天子也，<ruby>被<rt>ㄆ一</rt></ruby><ruby>袗<rt>ㄓㄣˇ</rt></ruby>衣，鼓琴，二女<ruby>果<rt>ㄜˇ</rt></ruby>，若固有之。」</h1>
<p>&nbsp;</p>
<h2>飯糗：吃乾糧。糗，乾米麥。</h2>
<h2>茹草：吃野菜。茹，吃；草，指沒有加工過的粗菜。</h2>
<!-- <h3>若將終身焉：好像打算一輩子都過這樣清苦的生活。</h3> -->
<!-- <h3>被袗衣：穿著畫有文采的衣服。被，同「披」；袗（ㄓㄣˇ），畫衣、單層有花紋的衣服。</h3> -->
<h2>鼓琴：彈琴。</h2>
<h2>二女果：指堯的女兒娥皇、女英。果，服侍左右。</h2>
<h2>若固有之：彷彿本來就擁有這一切似的，形容其安然自得而不驕矜。</h2>

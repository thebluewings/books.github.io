<h1>《孟子》盡心章句下．第一章</h1>
<h1>孟子曰：</h1>
<h1>　「不仁哉，梁惠王也！</h1>
<h1>　　仁者以其所愛及其所不愛，</h1>
<h1>　　不仁者以其所不愛及其所愛。」</h1>
<h1>公孫丑曰：「何謂也？」</h1>
<h1>　「梁惠王以土地之故，糜爛其民而戰之，大敗，</h1>
<h1>　　將復之，恐不能勝，</h1>
<h1>　　故驅其所愛子弟以殉之，</h1>
<h1>　　是之謂以其所不愛及其所愛也。」</h1>

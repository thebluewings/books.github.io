<h1>《孟子》盡心章句上．第四十六章</h1>
<h1>孟子曰：</h1>
<h1>　「知者無不知也，當務之為急；</h1>
<h1>　　仁者無不愛也，急親賢之為務。</h1>
<h1>　　堯舜之知而不<ruby>徧<rt>ㄅㄧㄢˋ</rt></ruby>物，急先務也；</h1>
<h1>　　堯舜之仁不<ruby>徧<rt>ㄅㄧㄢˋ</rt></ruby>愛人，急親賢也。</h1>
<h1>　　不能三年之喪，而<ruby>緦<rt>ㄙ</rt></ruby>小功之察；</h1>
<h1>　　放飯流<ruby>歠<rt>ㄔㄨㄛˋ</rt></ruby>，而問無齒決，</h1>
<h1>　　是之謂不知務。」</h1>

<h1>《孟子》盡心章句上．第三十七章</h1>
<h1>孟子曰：</h1>
<h1>　「食而弗愛，<ruby>豕<rt>ㄕˇ</rt></ruby>交之也；</h1>
<h1>　　愛而不敬，獸<ruby>畜<rt>ㄒㄩˋ</rt></ruby>之也。</h1>
<h1>　　恭敬者，幣之未將者也。</h1>
<h1>　　恭敬而無實，君子不可虛<ruby>拘<rt>ㄐㄩ</rt></ruby>。」</h1>
<p>&nbsp;</p>
<h3>《AI生成的註釋》</h3>
<h3>食：飼養。</h3>
<h3>弗：不。</h3>
<h3>豕：豬。</h3>
<h3>交：交往、對待。</h3>
<h3>畜：養。</h3>
<h3>幣：禮物。</h3>
<h3>將：送、獻。</h3>
<h3>實：真心實意。</h3>
<h3>虛拘：空洞、形式上的拘泥。</h3>

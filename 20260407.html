<h1>《孟子》盡心章句上．第三十七章</h1>
<h1>孟子曰：</h1>
<h1>「食而弗愛，<ruby>豕<rt>ㄕˇ</rt></ruby>交之也；</h1>
<h1>愛而不敬，獸<ruby>畜<rt>ㄒㄩˋ</rt></ruby>之也。</h1>
<h1>恭敬者，幣之未將者也。</h1>
<h1>恭敬而無實，君子不可虛<ruby>拘<rt>ㄐㄩ</rt></ruby>。」</h1>
<p>&nbsp;</p>
<h2>食：飼養。</h2>
<h2>弗：不。</h2>
<h2>豕：豬。</h2>
<h2>交：交往、對待。</h2>
<h2>畜：養。</h2>
<h2>幣：禮物。</h2>
<h2>將：送、獻。</h2>
<h2>實：真心實意。</h2>
<h2>虛拘：空洞、形式上的拘泥。</h2>

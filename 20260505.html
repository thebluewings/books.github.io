<h1>《孟子》盡心章句上．第四十二章</h1>
<h1>孟子曰：</h1>
<h1>　「天下有道，以道殉身；</h1>
<h1>　　天下無道，以身殉道。</h1>
<h1>　　未聞以道殉人者也。」</h1>

<h1>《孟子》盡心章句上．第三十三章</h1>
<h1>　　王子墊問曰：「士何事？」</h1>
<h1>　　孟子曰：「尚志。」</h1>
<h1>　　曰：「何謂尚志？」</h1>
<h1>　　曰：「仁義而已矣。</h1>
<h1>　　　　殺一無罪，非仁也；非其有而取之，非義也。</h1>
<h1>　　　　居<ruby>惡<rt>ㄨ</rt></ruby>在仁是也；路<ruby>惡<rt>ㄨ</rt></ruby>在義是也。</h1>
<h1>　　　　居仁由義，大人之事備矣。」</h1>
<p>&nbsp;</p>
<h2>士何事？：身為一個士人的存在意義是什麼？</h2>
<h2>尚志：崇尚志向</h2>
<h2>惡：何在</h2>

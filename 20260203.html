<h1>《孟子》盡心章句上．第二十六章</h1>
<h1>孟子曰：</h1>
<h1>　「楊子取為我，拔一毛而利天下，不為也。</h1>
<h1>　　墨子兼愛，摩頂放踵利天下，為之。</h1>
<h1>　　子莫執中，執中為近之，執中無權，猶執一也。</h1>
<h1>　　所惡執一者，為其賊道也，舉一而廢百也。」</h1>
<p>&nbsp;</p>
<h2>權：判斷力，權衡</h2>
